    <!-- PDF Modal (kept for consistency) -->
    <div id="pdfModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Simulation Report</h3>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <iframe id="pdfViewer" class="pdf-viewer"></iframe>
        </div>
    </div>

    <script>
        function openPDF(title, pdfUrl) {
            const modal = document.getElementById('pdfModal');
            const modalTitle = document.getElementById('modalTitle');
            const pdfViewer = document.getElementById('pdfViewer');
            
            modalTitle.textContent = title;
            pdfViewer.src = pdfUrl;
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('pdfModal');
            const pdfViewer = document.getElementById('pdfViewer');
            
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
            
            // Clear PDF after closing for performance
            setTimeout(() => {
                pdfViewer.src = '';
            }, 300);
        }

        // Close modal on escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });

        // Close modal on background click
        document.getElementById('pdfModal').addEventListener('click', function(event) {
            if (event.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
